<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Codexael - Coming Soon</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(-45deg, #1a73e8, #111, #0f9d58, #ff6f00);
                background-size: 400% 400%;
                animation: gradientShift 12s ease infinite;
                color: #fff;
            }

            @keyframes gradientShift {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }

            .card {
                background: rgba(255, 255, 255, 0.1);
                padding: 3rem 2rem;
                border-radius: 20px;
                backdrop-filter: blur(12px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
                text-align: center;
                animation: fadeIn 1.5s ease;
                max-width: 500px;
                width: 90%;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            h1 {
                font-size: 2.8rem;
                margin-bottom: 1rem;
                background: linear-gradient(90deg, #ffcc00, #00e5ff, #ff4081);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                animation: shine 5s linear infinite;
            }

            @keyframes shine {
                0% { background-position: 0% 50%; }
                100% { background-position: 200% 50%; }
            }

            p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                opacity: 0.9;
            }

            .btn {
                display: inline-block;
                padding: 0.8rem 1.8rem;
                border-radius: 30px;
                background: linear-gradient(135deg, #ffcc00, #ff6f00);
                color: #111;
                font-weight: bold;
                text-decoration: none;
                transition: transform 0.3s, box-shadow 0.3s;
            }

            .btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 5px 20px rgba(255, 204, 0, 0.6);
            }

            footer {
                margin-top: 2rem;
                font-size: 0.9rem;
                opacity: 0.7;
            }

            .subtitle {
                font-size: 0.8rem;
                font-weight: 500;
                letter-spacing: 1px;
                margin-bottom: 1.5rem;
                color: #f1f1f1;
                opacity: 0.85;
                font-style: italic;
            }

            .stay_tuned {
                font-size: 1.0rem;
            }
        </style>
    </head>
    <body>
    <div class="card">
        <h1>🚀 Codexael</h1>
        <h2 class="subtitle">Smart Software. Simple Solutions.</h2>
        <p>Our new website is <strong>coming soon</strong>.<br/>  
        <span class="stay_tuned">Stay tuned for something amazing!</span></p>
        <a href="mailto:contact@codexael.com" class="btn">Contact Us</a>
        <footer>
            <strong>© 2025 Codexael. All rights reserved.</strong>
        </footer>
    </div>
    </body>
</html>
