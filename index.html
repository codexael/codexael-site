<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Codexael — Coming Soon</title>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

        <!-- Bootstrap 5 -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

        <style>
            /* ─── CSS Variables ─────────────────────────────────── */
            :root {
                --bg: #0a0a0a;
                --surface: #111111;
                --border: rgba(255, 255, 255, 0.07);
                --accent: #e8ff00;
                /* electric lime */
                --accent2: #00ffe0;
                /* cyan pop */
                --text: #f0ede6;
                --muted: rgba(240, 237, 230, 0.4);
                --font-hero: "Bebas Neue", sans-serif;
                --font-body: "DM Sans", sans-serif;
                --font-mono: "Space Mono", monospace;
            }

            /* ─── Reset & Base ──────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: var(--font-body);
                min-height: 100vh;
                overflow-x: hidden;
                cursor: none;
            }

            /* ─── Custom Cursor ─────────────────────────────────── */
            .cursor {
                position: fixed;
                width: 10px;
                height: 10px;
                background: var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition:
                transform 0.08s ease,
                width 0.2s ease,
                height 0.2s ease;
            }

            .cursor-ring {
                position: fixed;
                width: 38px;
                height: 38px;
                border: 1.5px solid var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition:
                transform 0.18s ease,
                width 0.2s ease,
                height 0.2s ease,
                opacity 0.2s ease;
                opacity: 0.5;
            }

            body:hover .cursor {
                opacity: 1;
            }

            /* ─── Grid Overlay ──────────────────────────────────── */
            .grid-overlay {
                position: fixed;
                inset: 0;
                background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
                background-size: 60px 60px;
                pointer-events: none;
                z-index: 0;
            }

            /* ─── Noise Texture ─────────────────────────────────── */
            .noise {
                position: fixed;
                inset: 0;
                opacity: 0.025;
                pointer-events: none;
                z-index: 1;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
                background-size: 180px;
            }

            /* ─── Glow blobs ────────────────────────────────────── */
            .blob {
                position: fixed;
                border-radius: 50%;
                filter: blur(100px);
                pointer-events: none;
                z-index: 0;
                opacity: 0.18;
                animation: drift 14s ease-in-out infinite alternate;
            }

            .blob-1 {
                width: 520px;
                height: 520px;
                background: var(--accent);
                top: -150px;
                left: -180px;
                animation-delay: 0s;
            }

            .blob-2 {
                width: 400px;
                height: 400px;
                background: var(--accent2);
                bottom: -120px;
                right: -120px;
                animation-delay: -7s;
            }

            @keyframes drift {
                0% {
                    transform: translate(0, 0) scale(1);
                }

                100% {
                    transform: translate(40px, 30px) scale(1.08);
                }
            }

            /* ─── Layout Shell ──────────────────────────────────── */
            .page-wrap {
                position: relative;
                z-index: 2;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* ─── Top Bar ───────────────────────────────────────── */
            .top-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 2rem 3rem;
                border-bottom: 1px solid var(--border);
                animation: slideDown 0.8s ease both;
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-18px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .logo-mark {
                font-family: var(--font-mono);
                font-size: 0.85rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                color: var(--text);
                text-transform: uppercase;
            }

            .logo-mark span {
                color: var(--accent);
            }

            .status-pill {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-family: var(--font-mono);
                font-size: 0.7rem;
                letter-spacing: 0.1em;
                color: var(--muted);
                border: 1px solid var(--border);
                padding: 0.35rem 0.9rem;
                border-radius: 999px;
            }

            .status-dot {
                width: 6px;
                height: 6px;
                background: var(--accent);
                border-radius: 50%;
                animation: pulse 1.6s ease-in-out infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                    box-shadow: 0 0 0 0 rgba(232, 255, 0, 0.5);
                }

                50% {
                    opacity: 0.6;
                    box-shadow: 0 0 0 5px rgba(232, 255, 0, 0);
                }
            }

            /* ─── Hero ──────────────────────────────────────────── */
            .hero {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 4rem 3rem 3rem;
                position: relative;
            }

            .eyebrow {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                letter-spacing: 0.25em;
                color: var(--accent);
                text-transform: uppercase;
                margin-bottom: 1.6rem;
                opacity: 0;
                animation: fadeUp 0.7s 0.3s ease forwards;
            }

            .hero-headline {
                font-family: var(--font-hero);
                font-size: clamp(5.5rem, 14vw, 13rem);
                line-height: 0.9;
                letter-spacing: -0.01em;
                color: var(--text);
                overflow: hidden;
            }

            .hero-headline .line {
                display: block;
                opacity: 0;
                transform: translateY(100%);
                animation: revealLine 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }

            .hero-headline .line:nth-child(1) {
                animation-delay: 0.45s;
            }

            .hero-headline .line:nth-child(2) {
                animation-delay: 0.62s;
            }

            .hero-headline .line.accent-line {
                color: var(--accent);
            }

            @keyframes revealLine {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }

                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
            }

            /* ─── Divider Row ───────────────────────────────────── */
            .divider-row {
                display: flex;
                align-items: center;
                gap: 1.5rem;
                margin: 2.5rem 0;
                opacity: 0;
                animation: fadeUp 0.7s 0.9s ease forwards;
            }

            .divider-line {
                flex: 1;
                height: 1px;
                background: var(--border);
            }

            .divider-label {
                font-family: var(--font-mono);
                font-size: 0.68rem;
                letter-spacing: 0.2em;
                color: var(--muted);
                text-transform: uppercase;
                white-space: nowrap;
            }

            /* ─── Info Grid ─────────────────────────────────────── */
            .info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr auto;
                gap: 0;
                border: 1px solid var(--border);
                border-radius: 4px;
                overflow: hidden;
                max-width: 820px;
                opacity: 0;
                animation: fadeUp 0.7s 1.05s ease forwards;
            }

            .info-cell {
                padding: 1.6rem 2rem;
                border-right: 1px solid var(--border);
                position: relative;
            }

            .info-cell:last-child {
                border-right: none;
            }

            .info-label {
                font-family: var(--font-mono);
                font-size: 0.62rem;
                letter-spacing: 0.18em;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 0.6rem;
            }

            .info-value {
                font-family: var(--font-body);
                font-size: 0.95rem;
                font-weight: 500;
                color: var(--text);
            }

            /* CTA cell */
            .cta-cell {
                display: flex;
                align-items: center;
                padding: 1.6rem 2rem;
            }

            .cta-btn {
                display: inline-flex;
                align-items: center;
                gap: 0.7rem;
                font-family: var(--font-mono);
                font-size: 0.78rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #0a0a0a;
                background: var(--accent);
                border: none;
                padding: 0.85rem 1.6rem;
                border-radius: 3px;
                cursor: none;
                text-decoration: none;
                transition:
                background 0.2s,
                transform 0.2s,
                box-shadow 0.2s;
                white-space: nowrap;
            }

            .cta-btn:hover {
                background: var(--accent2);
                transform: translateY(-2px);
                box-shadow: 0 8px 28px rgba(0, 255, 224, 0.3);
            }

            .cta-arrow {
                display: inline-block;
                transition: transform 0.2s;
            }

            .cta-btn:hover .cta-arrow {
                transform: translateX(4px);
            }

            /* ─── Marquee ───────────────────────────────────────── */
            .marquee-wrap {
                overflow: hidden;
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
                padding: 1rem 0;
                opacity: 0;
                animation: fadeUp 0.7s 1.4s ease forwards;
            }

            .marquee-track {
                display: flex;
                gap: 0;
                animation: marquee 22s linear infinite;
                white-space: nowrap;
            }

            .marquee-item {
                font-family: var(--font-hero);
                font-size: 1.1rem;
                letter-spacing: 0.18em;
                color: var(--muted);
                text-transform: uppercase;
                padding: 0 2.5rem;
                display: flex;
                align-items: center;
                gap: 2.5rem;
            }

            .marquee-item .dot {
                color: var(--accent);
                font-size: 1.4rem;
                line-height: 1;
            }

            @keyframes marquee {
                from {
                    transform: translateX(0);
                }

                to {
                    transform: translateX(-50%);
                }
            }

            /* ─── Bottom Bar ────────────────────────────────────── */
            .bottom-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1.5rem 3rem;
                border-top: 1px solid var(--border);
                opacity: 0;
                animation: fadeUp 0.7s 1.55s ease forwards;
            }

            .copyright {
                font-family: var(--font-mono);
                font-size: 0.65rem;
                letter-spacing: 0.12em;
                color: var(--muted);
            }

            .tagline {
                font-family: var(--font-body);
                font-size: 0.8rem;
                font-style: italic;
                color: var(--muted);
            }

            .social-links {
                display: flex;
                gap: 1rem;
            }

            .social-link {
                font-family: var(--font-mono);
                font-size: 0.65rem;
                letter-spacing: 0.1em;
                color: var(--muted);
                text-decoration: none;
                text-transform: uppercase;
                transition: color 0.2s;
            }

            .social-link:hover {
                color: var(--accent);
            }

            /* ─── Responsive ────────────────────────────────────── */
            @media (max-width: 768px) {
                .top-bar,
                .hero,
                .bottom-bar {
                    padding-left: 1.5rem;
                    padding-right: 1.5rem;
                }

                .info-grid {
                    grid-template-columns: 1fr 1fr;
                }

                .info-cell:nth-child(2) {
                    border-right: none;
                }

                .cta-cell {
                    grid-column: 1 / -1;
                    border-top: 1px solid var(--border);
                }

                .bottom-bar {
                    flex-direction: column;
                    gap: 0.8rem;
                    text-align: center;
                }
            }

            @media (max-width: 520px) {
                .info-grid {
                    grid-template-columns: 1fr;
                }

                .info-cell {
                    border-right: none;
                    border-bottom: 1px solid var(--border);
                }

                .info-cell:last-of-type {
                    border-bottom: none;
                }

                .hero {
                    padding-top: 2rem;
                }
            }
        </style>
    </head>

    <body>
        <!-- Custom cursor -->
        <div class="cursor" id="cursor"></div>
        <div class="cursor-ring" id="cursorRing"></div>

        <!-- Atmosphere layers -->
        <div class="grid-overlay"></div>
        <div class="noise"></div>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>

        <!-- Page -->
        <div class="page-wrap">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="logo-mark">Codex<span>ael</span></div>
                <div class="status-pill">
                    <span class="status-dot"></span>
                    Building in progress
                </div>
            </header>

            <!-- Hero -->
            <main class="hero">
            <p class="eyebrow">// 001 — New Studio Experience</p>

            <h1 class="hero-headline" aria-label="Coming Soon">
            <span class="line">Coming</span>
            <span class="line accent-line">Soon.</span>
            </h1>

            <div class="divider-row">
            <div class="divider-line"></div>
            <span class="divider-label">Smart Software. Simple Solutions.</span>
            <div class="divider-line"></div>
            </div>

            <!-- Info Grid -->
            <div class="info-grid">
            <div class="info-cell">
            <p class="info-label">Studio</p>
            <p class="info-value">Codexael</p>
            </div>
            <div class="info-cell">
            <p class="info-label">Status</p>
            <p class="info-value">Under Development</p>
            </div>
            <div class="cta-cell">
            <a href="mailto:contact@codexael.com" class="cta-btn">
            Get in Touch <span class="cta-arrow">→</span>
            </a>
            </div>
            </div>
            </main>

            <!-- Marquee -->
            <div class="marquee-wrap" aria-hidden="true">
                <div class="marquee-track" id="marqueeTrack"></div>
            </div>

            <!-- Bottom Bar -->
            <footer class="bottom-bar">
                <span class="copyright">© 2025 Codexael. All rights reserved.</span>
                <span class="tagline">Designed by people who care about design.</span>
                <nav class="social-links">
                    <a href="mailto:contact@codexael.com" class="social-link">Email</a>
                </nav>
            </footer>
        </div>
        <!-- /page-wrap -->

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            /* ── Cursor ──────────────────────────────────────────── */
            const cursor = document.getElementById("cursor");
            const cursorRing = document.getElementById("cursorRing");
            let mx = 0,
            my = 0,
            rx = 0,
            ry = 0;

            document.addEventListener("mousemove", (e) => {
                mx = e.clientX;
                my = e.clientY;
                cursor.style.left = mx + "px";
                cursor.style.top = my + "px";
            });

            // Smooth ring lag
            (function animateRing() {
                rx += (mx - rx) * 0.12;
                ry += (my - ry) * 0.12;
                cursorRing.style.left = rx + "px";
                cursorRing.style.top = ry + "px";
                requestAnimationFrame(animateRing);
            })();

            // Hover expand
            document.querySelectorAll("a, button, .cta-btn").forEach((el) => {
                el.addEventListener("mouseenter", () => {
                    cursor.style.width = "20px";
                    cursor.style.height = "20px";
                    cursorRing.style.width = "56px";
                    cursorRing.style.height = "56px";
                    cursorRing.style.opacity = "0.9";
                });
                el.addEventListener("mouseleave", () => {
                    cursor.style.width = "10px";
                    cursor.style.height = "10px";
                    cursorRing.style.width = "38px";
                    cursorRing.style.height = "38px";
                    cursorRing.style.opacity = "0.5";
                });
            });

            /* ── Marquee ─────────────────────────────────────────── */
            const items = [
                "Web Design",
                "UI / UX",
                "Branding",
                "Development",
                "Motion",
                "Strategy",
                "Creative Direction",
                "Digital Products",
            ];
            const track = document.getElementById("marqueeTrack");
            // Duplicate for seamless loop
            [...items, ...items].forEach((text) => {
                const span = document.createElement("span");
                span.className = "marquee-item";
                span.innerHTML = `${text}<span class="dot" aria-hidden="true">✦</span>`;
                track.appendChild(span);
            });
        </script>
    </body>
</html>
